<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Drinks">
<meta name="theme-color" content="#111111">
<meta name="description" content="Track your drink consumption">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Drink Tracker</title>
<style>
  :root {
    --bg: #111111;
    --card: #1c1c1c;
    --card2: #242424;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
    --green: #4caf7d;
    --red: #e05555;
    --beer: #c8962a;
    --wine: #b84a6a;
    --cava: #7aabcf;
    --cocktail: #7aaa7a;
    --other: #999;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .app { max-width: 480px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; padding-top: var(--safe-top); padding-bottom: calc(62px + var(--safe-bottom)); }

  /* NAV */
  .nav { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 14px 4px; border: none; background: none; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; letter-spacing: .3px; }
  .nav-btn.active { color: var(--text); border-bottom-color: var(--text); }

  /* PAGES */
  .page { display: none; flex: 1; overflow-y: auto; flex-direction: column; -webkit-overflow-scrolling: touch; }
  .page.active { display: flex; }

  /* SESSION BAR */
  .session-bar { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; min-height: 52px; flex-shrink: 0; }
  .session-status { font-size: 13px; color: var(--muted); }
  .session-status span { color: var(--text); font-weight: 600; }
  .save-btn { background: var(--green); color: #fff; border: none; font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 8px; cursor: pointer; }
  .save-btn:active { opacity: .8; }

  /* STATS */
  .stats-row { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat { flex: 1; padding: 14px 0; text-align: center; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

  /* LOG */
  .log-scroll { flex: 1; overflow-y: auto; padding: 8px 16px; -webkit-overflow-scrolling: touch; }
  .log-empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
  .log-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .log-dot.beer { background: var(--beer); } .log-dot.wine { background: var(--wine); }
  .log-dot.cava { background: var(--cava); } .log-dot.cocktail { background: var(--cocktail); }
  .log-dot.other { background: var(--other); }
  .log-type { font-size: 14px; font-weight: 500; flex: 1; }
  .log-units { font-size: 13px; color: var(--muted); min-width: 52px; text-align: right; }
  .log-time { font-size: 12px; color: var(--muted2); min-width: 42px; text-align: right; }
  .log-del { background: none; border: none; color: var(--muted2); font-size: 20px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; }

  /* DRINK BAR */
  .drink-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); z-index: 50; }
  .drink-bar-inner { max-width: 480px; margin: 0 auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .drink-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 4px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: background .1s; }
  .drink-btn:active { background: var(--card2); transform: scale(0.96); }
  .drink-icon { width: 22px; height: 22px; }
  .drink-name { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .3px; text-transform: uppercase; }

  /* HISTORY */
  .section-head { padding: 14px 16px 8px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .export-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); margin: 0 16px 16px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
  .summary-card { background: var(--card); padding: 16px; }
  .summary-card .val { font-size: 26px; font-weight: 700; }
  .summary-card .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }
  .history-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .session-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .session-item:active { background: var(--card); }
  .session-item-row { display: flex; justify-content: space-between; align-items: center; }
  .session-date { font-size: 14px; font-weight: 600; }
  .session-units { font-size: 14px; font-weight: 700; }
  .session-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .session-pills { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--card2); color: var(--muted); }

  /* SETTINGS */
  .settings-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .settings-wrap { padding: 16px; }
  .settings-card { background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; font-weight: 500; }
  .setting-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .units-input { background: var(--card2); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 600; width: 64px; padding: 6px 10px; border-radius: 6px; text-align: center; }
  .clear-btn { width: 100%; padding: 13px; background: none; border: 1px solid var(--border); color: var(--red); font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; }

  /* INSTALL BANNER */
  .install-banner { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .install-banner-text { font-size: 13px; color: var(--muted); line-height: 1.5; flex: 1; }
  .install-banner-text strong { color: var(--text); display: block; margin-bottom: 2px; }
  .install-btn { background: var(--text); color: var(--bg); border: none; font-size: 13px; font-weight: 700; padding: 9px 14px; border-radius: 8px; cursor: pointer; white-space: nowrap; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px 16px 0 0; padding: 20px 16px; padding-bottom: calc(20px + var(--safe-bottom)); width: 100%; max-width: 480px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .modal-drinks { display: flex; flex-direction: column; max-height: 55vh; overflow-y: auto; }
  .modal-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .modal-item:last-child { border-bottom: none; }
  .modal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .modal-info { flex: 1; font-size: 14px; font-weight: 500; }
  .modal-time { font-size: 12px; color: var(--muted); }
  .modal-close { width: 100%; margin-top: 14px; padding: 13px; background: var(--card2); border: none; color: var(--text); font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; }

  .toast { position: fixed; bottom: calc(74px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(8px); background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: all .25s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('log', this)">Log</button>
    <button class="nav-btn" onclick="showPage('history', this)">History</button>
    <button class="nav-btn" onclick="showPage('settings', this)">Settings</button>
  </div>

  <!-- LOG PAGE -->
  <div class="page active" id="page-log">
    <div class="session-bar">
      <div class="session-status" id="session-status">No active session</div>
      <button class="save-btn" id="save-btn" style="display:none" onclick="endSession()">Save session</button>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-drinks">0</div><div class="stat-label">Drinks</div></div>
      <div class="stat"><div class="stat-val" id="stat-units">0.0</div><div class="stat-label">Units</div></div>
      <div class="stat"><div class="stat-val" id="stat-dur">—</div><div class="stat-label">Duration</div></div>
    </div>
    <div class="log-scroll">
      <div id="log-list"><div class="log-empty">Tap a drink below to start</div></div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div class="section-head">Overview <button class="export-btn" onclick="exportCSV()">Export CSV</button></div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="section-head">Sessions</div>
    <div class="history-scroll"><div id="history-list"></div></div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="page-settings">
    <div class="settings-scroll"><div class="settings-wrap">
      <div class="section-head" style="padding:0 0 10px">Units per drink</div>
      <div class="settings-card">
        <div class="setting-row"><div><div class="setting-label">Beer</div><div class="setting-sub">0.5L half litre</div></div><input class="units-input" type="number" id="set-beer" step="0.5" min="0.5" max="5" value="1.3" onchange="saveSettings()"></div>
        <div class="setting-row"><div><div class="setting-label">Wine</div><div class="setting-sub">175ml glass</div></div><input class="units-input" type="number" id="set-wine" step="0.5" min="0.5" max="5" value="2.0" onchange="saveSettings()"></div>
        <div class="setting-row"><div><div class="setting-label">Cava</div><div class="setting-sub">125ml flute</div></div><input class="units-input" type="number" id="set-cava" step="0.5" min="0.5" max="5" value="1.5" onchange="saveSettings()"></div>
        <div class="setting-row"><div><div class="setting-label">Cocktail</div><div class="setting-sub">Standard cocktail</div></div><input class="units-input" type="number" id="set-cocktail" step="0.5" min="0.5" max="5" value="2.0" onchange="saveSettings()"></div>
        <div class="setting-row"><div><div class="setting-label">Other</div><div class="setting-sub">Custom drink</div></div><input class="units-input" type="number" id="set-other" step="0.5" min="0.5" max="5" value="1.0" onchange="saveSettings()"></div>
      </div>
      <div class="section-head" style="padding:0 0 10px">Data</div>
      <div class="settings-card">
        <div class="setting-row"><div><div class="setting-label">Saved sessions</div><div class="setting-sub" id="data-count">0 sessions</div></div></div>
        <div class="setting-row" style="border:none"><button class="clear-btn" onclick="clearAllData()">Clear all data</button></div>
      </div>
      <div class="section-head" style="padding:0 0 10px">Install App</div>
      <div id="install-section"></div>
    </div></div>
  </div>
</div>

<!-- DRINK BAR -->
<div class="drink-bar">
  <div class="drink-bar-inner">
    <button class="drink-btn" onclick="addDrink('beer')">
      <svg class="drink-icon" viewBox="0 0 24 24" fill="none" stroke="var(--beer)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h11l2 18H3L5 3z"/><line x1="5" y1="9" x2="18" y2="9"/></svg>
      <span class="drink-name">Beer</span>
    </button>
    <button class="drink-btn" onclick="addDrink('wine')">
      <svg class="drink-icon" viewBox="0 0 24 24" fill="none" stroke="var(--wine)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10l-2 7a5 5 0 0 1-6 0L7 3z"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
      <span class="drink-name">Wine</span>
    </button>
    <button class="drink-btn" onclick="addDrink('cava')">
      <svg class="drink-icon" viewBox="0 0 24 24" fill="none" stroke="var(--cava)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8l-1 10a4 4 0 0 1-6 0L8 3z"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="9" y1="21" x2="15" y2="21"/><circle cx="10" cy="6" r=".6" fill="var(--cava)"/><circle cx="14" cy="8" r=".6" fill="var(--cava)"/><circle cx="12" cy="5" r=".6" fill="var(--cava)"/></svg>
      <span class="drink-name">Cava</span>
    </button>
    <button class="drink-btn" onclick="addDrink('cocktail')">
      <svg class="drink-icon" viewBox="0 0 24 24" fill="none" stroke="var(--cocktail)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 0L12 13z"/><line x1="12" y1="13" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
      <span class="drink-name">Cocktail</span>
    </button>
    <button class="drink-btn" onclick="addDrink('other')">
      <svg class="drink-icon" viewBox="0 0 24 24" fill="none" stroke="var(--other)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".8" fill="var(--other)"/></svg>
      <span class="drink-name">Other</span>
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-drinks" id="modal-drinks"></div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- SERVICE WORKER REGISTRATION -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  renderInstallSection();
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  renderInstallSection();
});

function renderInstallSection() {
  const el = document.getElementById('install-section');
  if (!el) return;
  const isInstalled = window.matchMedia('(display-mode: standalone)').matches;
  if (isInstalled) {
    el.innerHTML = `<div class="settings-card"><div class="setting-row" style="border:none"><div><div class="setting-label">✓ App installed</div><div class="setting-sub">Running as standalone app</div></div></div></div>`;
  } else if (deferredPrompt) {
    el.innerHTML = `<div class="install-banner"><div class="install-banner-text"><strong>Install as App</strong>Add to your home screen for offline use</div><button class="install-btn" onclick="triggerInstall()">Install</button></div>`;
  } else {
    el.innerHTML = `<div class="settings-card"><div class="setting-row" style="border:none"><div><div class="setting-label">Add to Home Screen</div><div class="setting-sub">Tap Share → "Add to Home Screen" in Safari/Chrome</div></div></div></div>`;
  }
}

function triggerInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; renderInstallSection(); });
}
</script>

<script>
const TYPES = ['beer','wine','cava','cocktail','other'];
const COLORS = { beer:'var(--beer)', wine:'var(--wine)', cava:'var(--cava)', cocktail:'var(--cocktail)', other:'var(--other)' };

let state = {
  session: null,
  sessions: [],
  settings: { beer:1.3, wine:2.0, cava:1.5, cocktail:2.0, other:1.0 }
};

function save() {
  try { localStorage.setItem('drinktracker-v2', JSON.stringify({ sessions: state.sessions, settings: state.settings })); } catch(e) {}
}
function load() {
  try { const d = localStorage.getItem('drinktracker-v2'); if (d) parse(d); } catch(e) {}
  renderInstallSection();
  applySettings();
  render();
}
function parse(raw) {
  try { const d = JSON.parse(raw); state.sessions = d.sessions||[]; state.settings = {...state.settings,...(d.settings||{})}; } catch(e) {}
}

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  if (p==='history') renderHistory();
  if (p==='settings') { renderSettings(); renderInstallSection(); }
}

  function deleteItem(i) {
  if (!state.session) return;
  state.session.drinks.splice(i,1);
  if (!state.session.drinks.length) { state.session=null; document.getElementById('save-btn').style.display='none'; }
  render();
}

function render() {
  const drinks = state.session ? state.session.drinks : [];
  const total = drinks.reduce((s,d)=>s+d.units,0);
  let dur='—';
  if (drinks.length>=2) { const ms=new Date(drinks[drinks.length-1].time)-new Date(drinks[0].time); const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); dur=h>0?`${h}h ${m}m`:`${m}m`; }
  document.getElementById('stat-drinks').textContent=drinks.length;
  document.getElementById('stat-units').textContent=total.toFixed(1);
  document.getElementById('stat-dur').textContent=dur;
  const status=document.getElementById('session-status');
  if (state.session) status.innerHTML=`Active since <span>${fmt(new Date(state.session.startTime))}</span>`;
  else status.textContent='No active session';
  const list=document.getElementById('log-list');
  if (!drinks.length) { list.innerHTML='<div class="log-empty">Tap a drink below to start</div>'; return; }
  list.innerHTML=[...drinks].reverse().map((d,ri)=>{
    const i=drinks.length-1-ri;
    return `<div class="log-item"><div class="log-dot ${d.type}"></div><div class="log-type">${cap(d.type)}</div><div class="log-units">${d.units} units</div><div class="log-time">${fmt(new Date(d.time))}</div><button class="log-del" onclick="deleteItem(${i})">×</button></div>`;
  }).join('');
}

function renderHistory() {
  const s=state.sessions;
  const total=s.reduce((a,sess)=>a+sess.drinks.reduce((b,d)=>b+d.units,0),0);
  const avg=s.length?(total/s.length).toFixed(1):0;
  const max=s.length?Math.max(...s.map(sess=>sess.drinks.reduce((a,d)=>a+d.units,0))).toFixed(1):0;
  document.getElementById('summary-grid').innerHTML=`<div class="summary-card"><div class="val">${s.length}</div><div class="lbl">Sessions</div></div><div class="summary-card"><div class="val">${total.toFixed(1)}</div><div class="lbl">Total Units</div></div><div class="summary-card"><div class="val">${avg}</div><div class="lbl">Avg / Session</div></div><div class="summary-card"><div class="val">${max}</div><div class="lbl">Most in One Night</div></div>`;
  if (!s.length) { document.getElementById('history-list').innerHTML='<div class="log-empty" style="padding:30px 16px">No sessions yet</div>'; return; }
  document.getElementById('history-list').innerHTML=s.map((sess,idx)=>{
    const units=sess.drinks.reduce((a,d)=>a+d.units,0);
    const counts={};
    sess.drinks.forEach(d=>counts[d.type]=(counts[d.type]||0)+1);
    const pills=Object.entries(counts).map(([k,v])=>`<span class="pill">${v}× ${cap(k)}</span>`).join('');
    const start=fmt(new Date(sess.startTime));
    const end=sess.endTime?fmt(new Date(sess.endTime)):'';
    return `<div class="session-item" onclick="showModal(${idx})"><div class="session-item-row"><span class="session-date">${fmtDate(new Date(sess.startTime))}</span><span class="session-units">${units.toFixed(1)} units</span></div><div class="session-meta">${start}${end?' – '+end:''}</div><div class="session-pills">${pills}</div></div>`;
  }).join('');
}

function renderSettings() {
  TYPES.forEach(t=>{ const el=document.getElementById('set-'+t); if(el) el.value=state.settings[t]; });
  document.getElementById('data-count').textContent=state.sessions.length+' sessions stored';
}
function saveSettings() {
  TYPES.forEach(t=>{ const el=document.getElementById('set-'+t); if(el) state.settings[t]=parseFloat(el.value)||1.0; });
  save();
}
function applySettings() {}
function clearAllData() {
  if (!confirm('Delete all saved sessions?')) return;
  state.sessions=[]; save(); renderHistory(); renderSettings(); toast('All data cleared');
}
function exportCSV() {
  if (!state.sessions.length) { toast('No data to export'); return; }
  let csv='Date,Type,Units,Time\n';
  state.sessions.forEach(s=>{ const d=fmtDate(new Date(s.startTime)); s.drinks.forEach(dr=>{ csv+=`"${d}","${cap(dr.type)}",${dr.units},"${fmt(new Date(dr.time))}"\n`; }); });
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='drinks.csv'; a.click();
  toast('CSV exported');
}
function showModal(idx) {
  const sess=state.sessions[idx];
  document.getElementById('modal-title').textContent=fmtDate(new Date(sess.startTime));
  document.getElementById('modal-drinks').innerHTML=sess.drinks.map(d=>`<div class="modal-item"><div class="modal-dot" style="background:${COLORS[d.type]}"></div><div class="modal-info">${cap(d.type)} — ${d.units} units</div><div class="modal-time">${fmt(new Date(d.time))}</div></div>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) { if(e.target.id==='modal') document.getElementById('modal').classList.remove('open'); }
function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1); }
function fmt(d) { return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(d) { return d.toLocaleDateString([],{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

try { load(); } catch(e) { console.error(e); }
</script>
</body>
</html>
